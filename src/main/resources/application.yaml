server:
  port: 7860

spring:
  application:
    name: app
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  profiles:
    active: development

springdoc:
  swagger-ui:
    path: /swagger-ui.html

rsa:
  private-key: ${RSA_PRIVATE_KEY}
  public-key: classpath:certs/public.pem

sentry:
  dsn: ${SENTRY_DSN}
  traces-sample-rate: 1.0